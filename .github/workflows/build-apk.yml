name: Build Debug APK

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch: # Manuel tetikleme butonu

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: nicebase/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        working-directory: nicebase
        run: npm ci

      - name: Build web
        working-directory: nicebase
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GOOGLE_WEB_CLIENT_ID: ${{ secrets.VITE_GOOGLE_WEB_CLIENT_ID }}
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
        run: npm run build

      - name: Sync Capacitor
        working-directory: nicebase
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: nicebase/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: nicebase/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nicebase-debug-${{ github.run_number }}
          path: nicebase/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
