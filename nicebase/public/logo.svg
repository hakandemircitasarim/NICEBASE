<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C5A;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle with gradient -->
  <circle cx="256" cy="256" r="240" fill="url(#logoGradient)" opacity="0.1"/>
  
  <!-- Main anchor shape with heart-inspired design -->
  <g filter="url(#shadow)" transform="translate(256, 256)">
    <!-- Anchor shank -->
    <path d="M 0 -120 L 0 80 L -20 100 L 20 100 L 0 80 Z" fill="url(#logoGradient)"/>
    
    <!-- Anchor ring (top) -->
    <circle cx="0" cy="-120" r="18" fill="url(#logoGradient)"/>
    <circle cx="0" cy="-120" r="12" fill="#FFFFFF" opacity="0.3"/>
    
    <!-- Anchor arms (heart-like shape) -->
    <path d="M -60 -40 Q -80 -60 -80 -80 Q -80 -100 -60 -100 Q -50 -100 -45 -95 Q -40 -100 -30 -100 Q -10 -100 -10 -80 Q -10 -60 -30 -40 Z" 
          fill="url(#logoGradient)"/>
    <path d="M 60 -40 Q 80 -60 80 -80 Q 80 -100 60 -100 Q 50 -100 45 -95 Q 40 -100 30 -100 Q 10 -100 10 -80 Q 10 -60 30 -40 Z" 
          fill="url(#logoGradient)"/>
    
    <!-- Center heart detail -->
    <path d="M -25 -50 Q -25 -60 -15 -60 Q -5 -60 -5 -50 Q -5 -40 -15 -40 Q -25 -40 -25 -50 Z" 
          fill="#FFFFFF" opacity="0.4"/>
    <path d="M 25 -50 Q 25 -60 15 -60 Q 5 -60 5 -50 Q 5 -40 15 -40 Q 25 -40 25 -50 Z" 
          fill="#FFFFFF" opacity="0.4"/>
    
    <!-- Small decorative stars (memories) -->
    <g opacity="0.6">
      <circle cx="-70" cy="-120" r="3" fill="#FFFFFF"/>
      <circle cx="70" cy="-120" r="3" fill="#FFFFFF"/>
      <circle cx="-50" cy="60" r="2.5" fill="#FFFFFF"/>
      <circle cx="50" cy="60" r="2.5" fill="#FFFFFF"/>
    </g>
  </g>
</svg>
