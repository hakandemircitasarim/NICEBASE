<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF8C5A"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bgGrad)"/>

  <!-- Subtle shine overlay -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#shineGrad)"/>

  <!-- Anchor + Heart icon in white -->
  <g transform="translate(256, 248)">
    <!-- Anchor ring (top circle) -->
    <circle cx="0" cy="-118" r="30" stroke="#FFFFFF" stroke-width="16" fill="none"/>

    <!-- Small dot in ring -->
    <circle cx="0" cy="-118" r="6" fill="#FFFFFF"/>

    <!-- Vertical shank -->
    <rect x="-8" y="-88" width="16" height="196" rx="8" fill="#FFFFFF"/>

    <!-- Heart-shaped arms (left) -->
    <path d="M -8 20
             C -8 20 -14 -10 -50 -36
             C -86 -62 -108 -26 -108 -2
             C -108 30 -76 60 -8 100"
          fill="none" stroke="#FFFFFF" stroke-width="16" stroke-linecap="round"/>

    <!-- Heart-shaped arms (right) -->
    <path d="M 8 20
             C 8 20 14 -10 50 -36
             C 86 -62 108 -26 108 -2
             C 108 30 76 60 8 100"
          fill="none" stroke="#FFFFFF" stroke-width="16" stroke-linecap="round"/>

    <!-- Bottom anchor flukes -->
    <circle cx="-92" cy="54" r="12" fill="#FFFFFF"/>
    <circle cx="92" cy="54" r="12" fill="#FFFFFF"/>

    <!-- Small heart at anchor crossbar -->
    <path d="M 0 -20
             C -4 -28 -16 -28 -16 -18
             C -16 -10 0 2 0 2
             C 0 2 16 -10 16 -18
             C 16 -28 4 -28 0 -20 Z"
          fill="#FFFFFF" opacity="0.9"/>
  </g>
</svg>
