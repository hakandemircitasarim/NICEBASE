<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="32" height="32">
  <defs>
    <clipPath id="ic">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>

    <linearGradient id="outerG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB068"/>
      <stop offset="80%" stop-color="#CC5018"/>
      <stop offset="100%" stop-color="#CC5018"/>
    </linearGradient>

    <clipPath id="portalClip">
      <path d="M 156,500 L 156,250 A 100,100 0 0,1 356,250 L 356,500 Z"/>
    </clipPath>

    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FF8030" stop-opacity="0.95"/>
      <stop offset="25%" stop-color="#EE5515" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#AA2D05" stop-opacity="0.03"/>
    </radialGradient>

    <radialGradient id="core" cx="0.5" cy="0.5" r="0.1">
      <stop offset="0%" stop-color="#FFCC60" stop-opacity="1"/>
      <stop offset="50%" stop-color="#FF8828" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FF7020" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#ic)">
    <rect width="512" height="512" fill="#111"/>

    <path d="
      M 68,250
      A 188,188 0 0,1 444,250
      L 444,438
      A 88,88 0 0,1 356,350
      L 356,250
      A 100,100 0 0,0 156,250
      L 156,350
      A 88,88 0 0,1 68,438
      Z
    " fill="url(#outerG)"/>

    <path d="
      M 113,250
      A 143,143 0 0,1 399,250
      L 399,393
      A 43,43 0 0,1 356,350
      L 356,250
      A 100,100 0 0,0 156,250
      L 156,350
      A 43,43 0 0,1 113,393
      Z
    " fill="#CC5018"/>

    <g clip-path="url(#portalClip)">
      <ellipse cx="256" cy="250" rx="100" ry="120" fill="url(#glow)"/>
      <ellipse cx="256" cy="250" rx="100" ry="120" fill="url(#core)"/>
    </g>
